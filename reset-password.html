<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور | سعر النهاردة</title>
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#1a1a1a;--surface-light:#2a2a2a;--gold:#ffc107;--text:#fff;--text-muted:#888;--green:#4caf50;--red:#f44336;--radius:16px;--radius-sm:12px;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--surface);border-radius:var(--radius);width:100%;max-width:420px;padding:40px 32px;border:1px solid var(--surface-light);text-align:center}
.logo{font-size:1.6rem;font-weight:900;color:var(--gold);margin-bottom:8px}
.logo span{color:var(--text)}
.tagline{font-size:0.78rem;color:var(--text-muted);margin-bottom:32px}
.form-group{margin-bottom:16px;text-align:right}
.form-group label{display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:6px;font-weight:600}
.form-group input{width:100%;background:var(--surface-light);border:1.5px solid #3a3a3a;color:var(--text);padding:13px 16px;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:0.92rem}
.form-group input:focus{outline:none;border-color:var(--gold)}
.btn{width:100%;border:none;padding:13px;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;background:var(--gold);color:#1a1a1a;margin-top:8px}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.error{color:var(--red);font-size:0.85rem;margin-top:12px;display:none}
.success{color:var(--green);font-size:0.85rem;margin-top:12px;display:none}
.back-link{display:block;margin-top:24px;color:var(--text-muted);text-decoration:none;font-size:0.85rem}
.back-link:hover{color:var(--gold)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-left:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">سعر <span>النهاردة</span> 🥇</div>
  <div class="tagline">إعادة تعيين كلمة المرور</div>
  
  <div id="step1">
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px">اكتب كلمة المرور الجديدة</p>
    <div class="form-group">
      <label>كلمة المرور الجديدة</label>
      <input type="password" id="newPass" placeholder="******" minlength="6">
    </div>
    <div class="form-group">
      <label>تأكيد كلمة المرور</label>
      <input type="password" id="confirmPass" placeholder="******">
    </div>
    <button class="btn" id="resetBtn" onclick="resetPassword()">تغيير كلمة المرور</button>
  </div>
  
  <div id="step2" style="display:none">
    <p style="color:var(--green);font-size:1rem;margin-bottom:16px">✅ تم تغيير كلمة المرور بنجاح!</p>
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px">ممكن تسجل دخولك دلوقتي بالباسورد الجديد</p>
    <button class="btn" onclick="goToLogin()">تسجيل الدخول</button>
  </div>
  
  <div class="error" id="errMsg"></div>
  <div class="success" id="succMsg"></div>
  
  <a href="login.html" class="back-link">← الرجوع لتسجيل الدخول</a>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabaseUrl='https://qgilfubcnavitfhqmidj.supabase.co';
const supabaseKey='sb_publishable_XYhvHo3cpN8IVII8PZ0GiQ_yzvHvUgl';
const supabase=createClient(supabaseUrl,supabaseKey);

window.resetPassword = async function() {
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  const btn = document.getElementById('resetBtn');
  const err = document.getElementById('errMsg');
  
  err.style.display = 'none';
  
  if (!newPass || newPass.length < 6) {
    err.textContent = 'كلمة المرور لازم 6 أحرف على الأقل';
    err.style.display = 'block';
    return;
  }
  
  if (newPass !== confirmPass) {
    err.textContent = 'كلمتي المرور مش متطابقتين';
    err.style.display = 'block';
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> جار التحميل';
  
  try {
    const { error } = await supabase.auth.updateUser({ password: newPass });
    if (error) throw error;
    
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
  } catch (e) {
    err.textContent = '❌ ' + (e.message || 'حدث خطأ');
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'تغيير كلمة المرور';
  }
};

window.goToLogin = function() {
  window.location.href = 'login.html';
};
</script>
</body>
</html>
