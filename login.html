<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>تسجيل الدخول | سعر النهاردة</title>
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --surface:#1a1a1a;
  --surface-light:#2a2a2a;
  --card:#ffffff;
  --card-alt:#f5f5f5;
  --text:#ffffff;
  --text-dark:#1a1a1a;
  --text-muted:#888888;
  --gold:#ffc107;
  --gold-dark:#e6ac00;
  --gold-pale:#faf6ed;
  --green:#4caf50;
  --red:#f44336;
  --blue:#2196f3;
  --shadow:0 4px 20px rgba(0,0,0,0.4);
  --radius:16px;
  --radius-sm:12px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}

.auth-card{
  background:var(--surface);border-radius:var(--radius);width:100%;max-width:420px;
  padding:40px 32px;box-shadow:var(--shadow);border:1px solid var(--surface-light);
}

.brand{text-align:center;margin-bottom:32px}
.brand a{text-decoration:none}
.brand .logo{font-size:1.6rem;font-weight:900;color:var(--gold);letter-spacing:-0.5px}
.brand .logo span{color:var(--text)}
.brand .tagline{font-size:0.78rem;color:var(--text-muted);margin-top:8px;font-weight:500}

.mode-title{text-align:center;font-size:1.1rem;font-weight:700;margin-bottom:24px;color:var(--text)}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:6px;font-weight:600}
.form-group input{
  width:100%;background:var(--surface-light);border:1.5px solid #3a3a3a;
  color:var(--text);padding:13px 16px;border-radius:var(--radius-sm);
  font-family:'Cairo',sans-serif;font-size:0.92rem;transition:border-color 0.2s,box-shadow 0.2s;
}
.form-group input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,193,7,0.1)}
.form-group input::placeholder{color:#666}

.btn{
  width:100%;border:none;padding:13px;border-radius:var(--radius-sm);
  font-family:'Cairo',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;
  transition:all 0.15s;margin-top:4px;
}
.btn:active{transform:scale(0.98)}
.btn-gold{background:var(--gold);color:var(--text-dark)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-google{
  background:var(--surface-light);color:var(--text);display:flex;align-items:center;
  justify-content:center;gap:10px;border:1.5px solid #3a3a3a;margin-top:0;
}
.btn-google:hover{background:#333;border-color:var(--gold)}
.btn-outline{
  background:transparent;color:var(--gold);border:1.5px solid var(--gold);margin-top:8px;
}
.btn-outline:hover{background:rgba(255,193,7,0.1)}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-muted);font-size:0.75rem;font-weight:600}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--surface-light)}

.toggle{text-align:center;margin-top:18px;font-size:0.85rem;color:var(--text-muted)}
.toggle a{color:var(--gold);text-decoration:none;font-weight:700;cursor:pointer}
.toggle a:hover{text-decoration:underline}

.error{background:rgba(244,67,54,0.1);border:1px solid rgba(244,67,54,0.3);border-radius:12px;padding:12px 14px;color:var(--red);font-size:0.82rem;margin-bottom:16px;display:none;font-weight:600}
.success{background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);border-radius:12px;padding:12px 14px;color:var(--green);font-size:0.82rem;margin-bottom:16px;display:none;font-weight:600}

.forgot-link{text-align:center;margin:12px 0;font-size:0.82rem}
.forgot-link a{color:var(--text-muted);text-decoration:none;cursor:pointer;transition:color 0.2s}
.forgot-link a:hover{color:var(--gold);text-decoration:underline}

.footer-note{text-align:center;font-size:0.68rem;color:var(--text-muted);margin-top:24px;line-height:1.6}
.footer-note a{color:var(--gold);text-decoration:none}
.footer-note a:hover{text-decoration:underline}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none !important}

.back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;font-size:0.85rem;color:var(--text-muted);text-decoration:none;transition:color 0.2s}
.back-link:hover{color:var(--gold)}
.back-link svg{width:18px;height:18px}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;
  display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border-radius:var(--radius);width:100%;max-width:400px;
  padding:28px;border:1px solid var(--surface-light);box-shadow:var(--shadow);
}
.modal h3{text-align:center;font-size:1.05rem;margin-bottom:8px;color:var(--text)}
.modal p{text-align:center;font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;line-height:1.5}
.modal .form-group{margin-bottom:14px}
.modal .btn-save{background:var(--gold);color:var(--text-dark);border:none;padding:12px;border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;width:100%}
.modal .btn-save:hover{background:var(--gold-dark)}
.modal .btn-cancel{background:transparent;color:var(--text-muted);border:none;padding:10px;font-family:'Cairo',sans-serif;font-size:0.85rem;cursor:pointer;width:100%;margin-top:8px}
.modal .btn-cancel:hover{color:var(--text)}

/* App-specific styles */
.app-hint{background:rgba(255,193,7,0.1);border:1px solid rgba(255,193,7,0.3);border-radius:12px;padding:12px 14px;color:var(--gold);font-size:0.82rem;margin-bottom:16px;display:none;font-weight:600;text-align:center}
</style>
</head>
<body>

<div class="auth-card">
  <div class="brand">
    <a href="index.html">
      <div class="logo">سعر <span>النهاردة</span> 🥇</div>
      <div class="tagline">أسعار الذهب والفضة والعملات في مصر</div>
    </a>
  </div>

  <div class="app-hint" id="appHint">📱 جاري فتح تطبيق Google...</div>
  <div class="error" id="errMsg"></div>
  <div class="success" id="succMsg"></div>

  <div class="mode-title" id="modeTitle">تسجيل الدخول</div>

  <div class="form-group hidden" id="nameWrap">
    <label>الاسم</label>
    <input type="text" id="name" placeholder="اكتب اسمك">
  </div>

  <div class="form-group">
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com">
  </div>

  <div class="form-group">
    <label>كلمة المرور</label>
    <input type="password" id="pass" placeholder="******">
  </div>

  <div class="forgot-link" id="forgotWrap">
    <a onclick="openForgotModal()">نسيت كلمة المرور؟</a>
  </div>

  <button class="btn btn-gold" id="actionBtn" onclick="handleAction()">دخول</button>

  <div class="toggle">
    <span id="toggleText">مش مسجل؟</span>
    <a onclick="toggleMode()" id="toggleLink">سجّل جديد</a>
  </div>

  <div class="divider">أو</div>

  <button class="btn btn-google" id="googleBtn" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span id="googleBtnText">الدخول بحساب Google</span>
  </button>

  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    الرجوع للرئيسية
  </a>

  <div class="footer-note">
    بتسجيل الدخول، أنت موافق على <a href="terms-of-service.html">الشروط</a> و <a href="privacy-policy.html">السياسة</a>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal">
    <h3>🔐 نسيت كلمة المرور؟</h3>
    <p>اكتب بريدك الإلكتروني وهنبعتلك رابط إعادة التعيين</p>
    <div class="error" id="forgot-error" style="display:none;margin-bottom:12px"></div>
    <div class="success" id="forgot-success" style="display:none;margin-bottom:12px"></div>
    <div class="form-group">
      <input type="email" id="forgot-email" placeholder="example@email.com">
    </div>
    <button class="btn-save" onclick="sendResetEmail()">إرسال الرابط</button>
    <button class="btn-cancel" onclick="closeForgotModal()">إلغاء</button>
  </div>
</div>

<!-- Supabase -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabaseUrl='https://qgilfubcnavitfhqmidj.supabase.co';
const supabaseKey='sb_publishable_XYhvHo3cpN8IVII8PZ0GiQ_yzvHvUgl';
const supabase=createClient(supabaseUrl,supabaseKey);
window.supabase=supabase;

// Check if already logged in
supabase.auth.getSession().then(({data:{session}})=>{
  if(session&&session.user){
    window.location.href='index.html';
  }
});
</script>

<script>
const $=id=>document.getElementById(id);
let isLogin=true;

function showErr(msg){$('errMsg').textContent=msg;$('errMsg').style.display='block';$('succMsg').style.display='none';}
function showSucc(msg){$('succMsg').textContent=msg;$('succMsg').style.display='block';$('errMsg').style.display='none';}
function clearMsgs(){$('errMsg').style.display='none';$('succMsg').style.display='none';}

function setLoad(btn,loading,text){
  if(loading){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> '+text;}
  else{btn.disabled=false;btn.innerHTML=text;}
}

function toggleMode(){
  isLogin=!isLogin;
  $('modeTitle').textContent=isLogin?'تسجيل الدخول':'إنشاء حساب جديد';
  $('actionBtn').textContent=isLogin?'دخول':'إنشاء حساب';
  $('toggleText').textContent=isLogin?'مش مسجل؟':'مسجل بالفعل؟';
  $('toggleLink').textContent=isLogin?'سجّل جديد':'سجّل دخول';
  $('nameWrap').classList.toggle('hidden',isLogin);
  $('forgotWrap').classList.toggle('hidden',!isLogin);
  clearMsgs();
}

// Detect if running in Capacitor app
function isCapacitorApp(){
  return window.Capacitor!==undefined || (window.Android!==undefined) || 
         navigator.userAgent.includes('Capacitor') || 
         (typeof window !== 'undefined' && window.webkit && window.webkit.messageHandlers);
}

// ===== GOOGLE LOGIN (Fixed for Mobile App) =====
window.googleLogin = async function() {
  const btn = $('googleBtn');
  const originalText = btn.innerHTML;
  
  try {
    // Check if running in Capacitor app
    if (isCapacitorApp()) {
      // Use native browser for OAuth in Capacitor
      $('appHint').style.display = 'block';
      showSucc('جاري فتح المتصفح للمصادقة...');
      
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: 'https://youssefmosaad.github.io/soralnaharda/login-callback.html',
          queryParams: { 
            prompt: 'select_account',
            access_type: 'offline'
          }
        }
      });
      
      if (error) throw error;
      
      // If URL is returned, open it in system browser
      if (data && data.url) {
        // For Capacitor, we need to open external browser
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser) {
          await window.Capacitor.Plugins.Browser.open({ url: data.url });
        } else {
          window.location.href = data.url;
        }
      }
    } else {
      // Web version - normal flow
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/index.html',
          queryParams: { prompt: 'select_account' }
        }
      });
      if (error) throw error;
    }
  } catch (err) {
    $('appHint').style.display = 'none';
    showErr('حدث خطأ أثناء الاتصال بجوجل: ' + (err.message || ''));
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
};

// Handle OAuth callback
async function handleOAuthCallback() {
  const hash = window.location.hash;
  const query = window.location.search;
  
  if (hash.includes('access_token') || query.includes('code')) {
    showSucc('جاري تسجيل الدخول...');
    
    // Exchange the code for session
    const { data, error } = await supabase.auth.exchangeCodeForSession(
      new URLSearchParams(query).get('code')
    );
    
    if (error) {
      showErr('فشل تسجيل الدخول: ' + error.message);
      return;
    }
    
    if (data && data.session) {
      window.location.href = 'index.html';
    }
  }
}

// Check for OAuth callback on load
if (window.location.search.includes('code=') || window.location.hash.includes('access_token')) {
  handleOAuthCallback();
}

// ===== SAVE PROFILE =====
async function saveProfile(userId, name, email) {
  try {
    await supabase.from('profiles').upsert({
      id: userId, name: name || email, email: email
    });
  } catch (err) {
    console.log('Profile save failed:', err);
  }
}

// ===== LOGIN / SIGNUP ACTION =====
window.handleAction = async function() {
  clearMsgs();
  const email = $('email').value.trim();
  const password = $('pass').value;
  const name = $('name').value.trim();

  if (!email || !password) { showErr('اكتب البريد وكلمة المرور'); return; }
  if (password.length < 6) { showErr('كلمة المرور لازم 6 أحرف على الأقل'); return; }
  if (!isLogin && !name) { showErr('اكتب اسمك'); return; }

  setLoad($('actionBtn'), true, isLogin ? 'جار التحميل' : 'جار الإنشاء');

  try {
    if (isLogin) {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      showSucc('تم تسجيل الدخول! جاري التحويل...');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } else {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) throw error;
      if (data.user && data.user.identities && data.user.identities.length === 0) {
        showErr('الحساب موجود بالفعل. جرب تسجيل الدخول.');
        setLoad($('actionBtn'), false, 'إنشاء حساب');
        return;
      }
      await saveProfile(data.user.id, name || email.split('@')[0], data.user.email);
      showSucc('تم إنشاء الحساب! جاري التحويل...');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    }
  } catch (err) {
    let msg = err.message || 'حدث خطأ غير متوقع';
    if (msg.includes('Invalid login')) msg = 'البريد أو كلمة المرور غلط.';
    if (msg.includes('Email not confirmed')) msg = 'لازم تفعل بريدك الإلكتروني من الرابط اللي وصلك.';
    showErr(msg);
    setLoad($('actionBtn'), false, isLogin ? 'دخول' : 'إنشاء حساب');
  }
};

// ===== FORGOT PASSWORD =====
window.openForgotModal = function() {
  $('forgotModal').classList.add('open');
  $('forgot-email').value = $('email').value || '';
  $('forgot-success').style.display = 'none';
  $('forgot-error').style.display = 'none';
};

window.closeForgotModal = function() {
  $('forgotModal').classList.remove('open');
};

window.sendResetEmail = async function() {
  const email = $('forgot-email').value.trim();
  const successEl = $('forgot-success');
  const errorEl = $('forgot-error');

  successEl.style.display = 'none';
  errorEl.style.display = 'none';

  if (!email) {
    errorEl.textContent = 'اكتب بريدك الإلكتروني';
    errorEl.style.display = 'block';
    return;
  }

  const btn = document.querySelector('#forgotModal .btn-save');
  setLoad(btn, true, 'جار الإرسال');

  try {
    // Use app-specific redirect URL for mobile
    const isApp = isCapacitorApp();
    const redirectUrl = isApp 
      ? 'https://youssefmosaad.github.io/soralnaharda/reset-password.html'
      : window.location.origin + '/login.html';

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: redirectUrl
    });
    
    if (error) throw error;

    successEl.textContent = '✅ تم إرسال رابط إعادة التعيين! اتفحص بريدك الإلكتروني.';
    successEl.style.display = 'block';
    setTimeout(closeForgotModal, 3000);
  } catch (err) {
    errorEl.textContent = '❌ ' + (err.message || 'حدث خطأ، جرب تاني');
    errorEl.style.display = 'block';
  } finally {
    setLoad(btn, false, 'إرسال الرابط');
  }
};

// Close modal on overlay click
$('forgotModal').addEventListener('click', (e) => {
  if (e.target === $('forgotModal')) closeForgotModal();
});

// Enter key support
$('pass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleAction();
});
$('forgot-email').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendResetEmail();
});
</script>
</body>
</html>
