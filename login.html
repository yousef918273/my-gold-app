<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | سعر النهارده</title>
<meta name="description" content="تسجيل الدخول إلى سعر النهارده - أسعار الذهب والعملات في مصر">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b8860b;
  --gold-light: #d4a843;
  --gold-pale: #faf6ed;
  --bg: #f5f3ef;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #666666;
  --muted: #999999;
  --border: #ebe8e3;
  --green: #2e7d32;
  --red: #c62828;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.08);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 420px;
  padding: 40px 32px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
}

.card:hover {
  box-shadow: var(--shadow-hover);
}

.brand {
  text-align: center;
  margin-bottom: 32px;
}

.brand a {
  text-decoration: none;
}

.brand .logo {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: -0.5px;
}

.brand .logo span {
  color: var(--text);
}

.brand .tagline {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 8px;
  font-weight: 500;
}

.mode-title {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--text);
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 600;
}

.form-group input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.92rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input:focus {
  outline: none;
  border-color: var(--gold-light);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
}

.form-group input::placeholder {
  color: var(--muted);
}

.btn {
  width: 100%;
  border: none;
  padding: 13px;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 4px;
}

.btn:active {
  transform: scale(0.98);
}

.btn-gold {
  background: var(--gold);
  color: #fff;
}

.btn-gold:hover {
  background: #9a7009;
}

.btn-google {
  background: var(--surface);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border: 1.5px solid var(--border);
  margin-top: 0;
}

.btn-google:hover {
  background: var(--gold-pale);
  border-color: var(--gold-light);
}

.btn-google svg {
  flex-shrink: 0;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--muted);
  font-size: 0.75rem;
  font-weight: 600;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.toggle {
  text-align: center;
  margin-top: 18px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.toggle a {
  color: var(--gold);
  text-decoration: none;
  font-weight: 700;
  cursor: pointer;
}

.toggle a:hover {
  text-decoration: underline;
}

.error {
  background: #ffebee;
  border: 1px solid #ffcdd2;
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--red);
  font-size: 0.82rem;
  margin-bottom: 16px;
  display: none;
  font-weight: 600;
}

.success {
  background: #e8f5e9;
  border: 1px solid #c8e6c9;
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--green);
  font-size: 0.82rem;
  margin-bottom: 16px;
  display: none;
  font-weight: 600;
}

.footer-note {
  text-align: center;
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 24px;
  line-height: 1.6;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hidden {
  display: none !important;
}

@media (max-width: 480px) {
  .card {
    padding: 32px 24px;
  }
  .brand .logo {
    font-size: 1.4rem;
  }
}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <a href="index.html">
      <div class="logo">سعر <span>النهارده</span></div>
      <div class="tagline">أسعار الذهب والعملات في مصر لحظة بلحظة</div>
    </a>
  </div>

  <div class="error" id="err"></div>
  <div class="success" id="succ"></div>

  <div class="mode-title" id="modeTitle">تسجيل الدخول</div>

  <div class="form-group">
    <label for="email">البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label for="pass">كلمة المرور</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>

  <div class="form-group hidden" id="nameWrap">
    <label for="name">الاسم الكامل</label>
    <input type="text" id="name" placeholder="محمد أحمد" autocomplete="name">
  </div>

  <button class="btn btn-gold" id="actionBtn" onclick="handleAction()">دخول</button>

  <div class="toggle">
    <span id="toggleText">لسه معندكش حساب؟</span>
    <a onclick="toggleMode()" id="toggleLink">سجّل جديد</a>
  </div>

  <div class="divider">أو</div>

  <button class="btn btn-google" onclick="googleLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.21 3.32v2.77h3.57c2.1-1.93 3.3-4.78 3.3-8.1z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-1 7.28-2.69l-3.57-2.77c-.99.69-2.26 1.1-3.71 1.1-2.87 0-5.3-1.93-6.17-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.83 14.11a7.11 7.11 0 0 1 0-4.22V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.65-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.65 2.84c.87-2.6 3.3-4.51 6.17-4.51z"/>
    </svg>
    تسجيل دخول بجوجل
  </button>

  <div class="footer-note">
    بتسجيل الدخول، بتوافق على استخدام البيانات بما يتماشى مع <a href="privacy-policy.html" style="color:var(--gold);text-decoration:none;">سياسة الخصوصية</a>.
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = 'https://qgilfubcnavitfhqmidj.supabase.co';
const supabaseKey = 'sb_publishable_XYhvHo3cpN8IVII8PZ0GiQ_yzvHvUgl';
const supabase = createClient(supabaseUrl, supabaseKey);

const $ = id => document.getElementById(id);
let isLogin = true;

async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = 'index.html';
}
checkSession();

function showErr(msg) {
  $('err').textContent = msg;
  $('err').style.display = 'block';
  $('succ').style.display = 'none';
}

function showSucc(msg) {
  $('succ').textContent = msg;
  $('succ').style.display = 'block';
  $('err').style.display = 'none';
}

function clearMsgs() {
  $('err').style.display = 'none';
  $('succ').style.display = 'none';
}

function setLoad(btn, loading, txt) {
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = txt + ' <span class="spinner"></span>';
  } else {
    btn.disabled = false;
    btn.textContent = txt;
  }
}

window.toggleMode = function() {
  isLogin = !isLogin;
  $('modeTitle').textContent = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
  $('actionBtn').textContent = isLogin ? 'دخول' : 'إنشاء حساب';
  $('toggleText').textContent = isLogin ? 'لسه معندكش حساب؟' : 'عندك حساب بالفعل؟';
  $('toggleLink').textContent = isLogin ? 'سجّل جديد' : 'سجّل دخول';
  $('nameWrap').classList.toggle('hidden', isLogin);
  clearMsgs();
};

window.googleLogin = async function() {
  try {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/index.html',
        queryParams: { prompt: 'select_account' }
      }
    });
    if (error) throw error;
  } catch (err) {
    showErr('حدث خطأ أثناء الاتصال بجوجل: ' + (err.message || ''));
  }
};

async function saveProfile(userId, name, email) {
  try {
    await supabase.from('profiles').upsert({
      id: userId, name: name || email, email: email
    });
  } catch (err) {
    console.log('Profile save failed:', err);
  }
}

window.handleAction = async function() {
  clearMsgs();
  const email = $('email').value.trim();
  const password = $('pass').value;
  const name = $('name').value.trim();

  if (!email || !password) { showErr('اكتب البريد وكلمة المرور'); return; }
  if (password.length < 6) { showErr('كلمة المرور لازم 6 أحرف على الأقل'); return; }
  if (!isLogin && !name) { showErr('اكتب اسمك'); return; }

  setLoad($('actionBtn'), true, isLogin ? 'جار التحميل' : 'جار الإنشاء');

  try {
    if (isLogin) {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      showSucc('تم تسجيل الدخول! جاري التحويل...');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } else {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) throw error;
      if (data.user && data.user.identities && data.user.identities.length === 0) {
        showErr('الحساب موجود بالفعل. جرب تسجيل الدخول.');
        setLoad($('actionBtn'), false, 'إنشاء حساب');
        return;
      }
      await saveProfile(data.user.id, name || email.split('@')[0], data.user.email);
      showSucc('تم إنشاء الحساب! جاري التحويل...');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    }
  } catch (err) {
    let msg = err.message || 'حدث خطأ غير متوقع';
    if (msg.includes('Invalid login')) msg = 'البريد أو كلمة المرور غلط.';
    if (msg.includes('Email not confirmed')) msg = 'لازم تفعل بريدك الإلكتروني من الرابط اللي وصلك.';
    showErr(msg);
    setLoad($('actionBtn'), false, isLogin ? 'دخول' : 'إنشاء حساب');
  }
};

$('pass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleAction();
});
</script>
</body>
</html>
