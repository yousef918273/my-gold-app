<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تسجيل الدخول | سعر النهارده</title>
<meta name="description" content="تسجيل الدخول إلى سعر النهارده">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gold-lt:#E8D08A;
  --dark:#0D0D0D;--card:#161616;--card2:#1C1C1C;
  --border:#2A2A2A;--text:#F0EDE6;--muted:#777;
  --green:#3DD68C;--red:#F05454;--purple:#A78BFA;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--dark);
  color:var(--text);
  font-family:'Cairo',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.login-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  width:100%;
  max-width:400px;
  padding:32px 28px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.logo-link{
  text-decoration:none;
  display:block;
  text-align:center;
  margin-bottom:24px;
}
.logo{
  font-size:1.4rem;
  font-weight:900;
  color:var(--gold);
  letter-spacing:1px;
}
.logo span{color:var(--text);}
.logo small{
  display:block;
  font-size:0.65rem;
  color:var(--muted);
  font-weight:400;
  letter-spacing:0;
  margin-top:4px;
}

.mode-title{
  text-align:center;
  font-size:1.1rem;
  font-weight:700;
  margin-bottom:20px;
  color:var(--text);
}

.form-group{
  margin-bottom:14px;
}
.form-group label{
  display:block;
  font-size:0.78rem;
  color:var(--muted);
  margin-bottom:5px;
  font-weight:600;
}
.form-group input{
  width:100%;
  background:var(--dark);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 12px;
  border-radius:10px;
  font-family:'Cairo',sans-serif;
  font-size:0.9rem;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.form-group input:focus{
  outline:none;
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,168,76,0.15);
}

.btn-block{
  width:100%;
  border:none;
  padding:11px;
  border-radius:10px;
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:0.95rem;
  cursor:pointer;
  transition:background 0.2s,transform 0.1s;
  margin-top:4px;
}
.btn-block.gold{
  background:var(--gold);
  color:#000;
}
.btn-block.gold:hover{background:var(--gold-lt);}
.btn-block.gold:active{transform:scale(0.98);}
.btn-block.secondary{
  background:var(--card2);
  color:var(--text);
  border:1px solid var(--border);
  margin-top:10px;
}
.btn-block.secondary:hover{background:#222;}

.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);font-size:0.72rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.btn-block.google{background:#fff;color:#444;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.btn-block.google:hover{background:#f0f0f0;}
.btn-block.google svg{flex-shrink:0;}

.toggle-mode{
  text-align:center;
  margin-top:16px;
  font-size:0.82rem;
  color:var(--muted);
}
.toggle-mode a{
  color:var(--gold);
  text-decoration:none;
  font-weight:700;
  cursor:pointer;
}
.toggle-mode a:hover{text-decoration:underline;}

.error-msg{
  background:#1a0a0a;
  border:1px solid #4a1a1a;
  border-radius:8px;
  padding:9px 11px;
  color:var(--red);
  font-size:0.8rem;
  margin-bottom:12px;
  display:none;
}

.success-msg{
  background:#0d1a0d;
  border:1px solid #1a3a1a;
  border-radius:8px;
  padding:9px 11px;
  color:var(--green);
  font-size:0.8rem;
  margin-bottom:12px;
  display:none;
}

.footer-note{
  text-align:center;
  font-size:0.65rem;
  color:var(--muted);
  margin-top:18px;
}

.loading-spinner{
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid rgba(0,0,0,0.3);
  border-top-color:#000;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  vertical-align:middle;
  margin-left:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}

@media (max-width: 480px){
  .login-card{padding:24px 18px;}
  .logo{font-size:1.2rem;}
}
</style>
</head>
<body>

<div class="login-card">
  <a href="index.html" class="logo-link">
    <div class="logo">سعر <span>النهارده</span><small>أسعار الذهب والعملات لحظة بلحظة</small></div>
  </a>

  <div class="error-msg" id="error-box"></div>
  <div class="success-msg" id="success-box"></div>

  <div id="login-form">
    <div class="mode-title" id="mode-title">تسجيل الدخول</div>
    <div class="form-group">
      <label for="email">البريد الإلكتروني</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">كلمة المرور</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-block gold" id="action-btn" onclick="handleAction()">دخول</button>
    <div class="divider">أو</div>
    <button class="btn-block google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.21 3.32v2.77h3.57c2.1-1.93 3.3-4.78 3.3-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-1 7.28-2.69l-3.57-2.77c-.99.69-2.26 1.1-3.71 1.1-2.87 0-5.3-1.93-6.17-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.83 14.11a7.11 7.11 0 0 1 0-4.22V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.65-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.65 2.84c.87-2.6 3.3-4.51 6.17-4.51z"/>
      </svg>
      تسجيل دخول بجوجل
    </button>
  </div>

  <div class="toggle-mode">
    <span id="toggle-text">لسه معندكش حساب؟</span>
    <a onclick="toggleMode()" id="toggle-link">سجّل جديد</a>
  </div>

  <div class="footer-note">
    بتسجيل الدخول، بتوافق على استخدام البيانات بما يتماشى مع خصوصيتك.
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = 'https://qgilfubcnavitfhqmidj.supabase.co';
const supabaseKey = 'sb_publishable_XYhvHo3cpN8IVII8PZ0GiQ_yzvHvUgl';
const supabase = createClient(supabaseUrl, supabaseKey);

const $ = id => document.getElementById(id);
let isLogin = true;

// لو المستخدم داخل بالفعل، ارجعه للصفحة الرئيسية
const { data: { session } } = await supabase.auth.getSession();
if (session) {
  window.location.href = 'index.html';
}

function showError(msg) {
  const el = $('error-box');
  el.textContent = msg;
  el.style.display = 'block';
  $('success-box').style.display = 'none';
}
function showSuccess(msg) {
  const el = $('success-box');
  el.textContent = msg;
  el.style.display = 'block';
  $('error-box').style.display = 'none';
}
function clearMsgs() {
  $('error-box').style.display = 'none';
  $('success-box').style.display = 'none';
}
function setLoading(loading) {
  const btn = $('action-btn');
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = 'جار التحميل... <span class="loading-spinner"></span>';
  } else {
    btn.disabled = false;
    btn.textContent = isLogin ? 'دخول' : 'إنشاء حساب';
  }
}

window.toggleMode = function () {
  isLogin = !isLogin;
  $('mode-title').textContent = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
  $('action-btn').textContent = isLogin ? 'دخول' : 'إنشاء حساب';
  $('toggle-text').textContent = isLogin ? 'لسه معندكش حساب؟' : 'عندك حساب بالفعل؟';
  $('toggle-link').textContent = isLogin ? 'سجّل جديد' : 'سجّل دخول';
  clearMsgs();
};

window.signInWithGoogle = async function () {
  try {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/index.html',
        queryParams: {
          prompt: 'select_account'
        }
      }
    });
    if (error) throw error;
  } catch (err) {
    console.error(err);
    showError('حدث خطأ أثناء الاتصال بجوجل: ' + (err.message || ''));
  }
};

window.handleAction = async function () {
  clearMsgs();
  const email = $('email').value.trim();
  const password = $('password').value;

  if (!email || !password) {
    showError('اكتب البريد الإلكتروني وكلمة المرور');
    return;
  }
  if (password.length < 6) {
    showError('كلمة المرور لازم تكون 6 أحرف على الأقل');
    return;
  }

  setLoading(true);

  try {
    if (isLogin) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      showSuccess('تم تسجيل الدخول! جاري التحويل...');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 800);
    } else {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) throw error;
      if (data.user && data.user.identities && data.user.identities.length === 0) {
        showError('الحساب موجود بالفعل. جرب تسجيل الدخول.');
        setLoading(false);
        return;
      }
      showSuccess('تم إنشاء الحساب! جاري التحويل...');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 800);
    }
  } catch (err) {
    console.error(err);
    let msg = err.message || 'حدث خطأ غير متوقع';
    if (msg.includes('Invalid login')) msg = 'البريد أو كلمة المرور غلط.';
    if (msg.includes('Email not confirmed')) msg = 'لازم تفعل بريدك الإلكتروني من الرابط اللي وصلك.';
    showError(msg);
    setLoading(false);
  }
};

// Enter key submits
$('password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleAction();
});
</script>
</body>
</html>
